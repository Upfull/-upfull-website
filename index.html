<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upfull Music — Bientôt disponible</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:#0D0D0D;color:#F0EDE8;
  font-family:'Courier New',monospace;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;overflow:hidden;
}
.topbar{position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#D12450,#FF4477,#D12450)}

/* Animated background bars */
.bars{position:fixed;inset:0;display:flex;align-items:flex-end;justify-content:center;gap:6px;padding:0 40px 0;opacity:0.07;pointer-events:none}
.bar{width:18px;border-radius:3px 3px 0 0;background:#D12450;animation:bounce 1.4s ease-in-out infinite}
.bar:nth-child(1){height:40%;animation-delay:0s}
.bar:nth-child(2){height:70%;animation-delay:0.1s}
.bar:nth-child(3){height:55%;animation-delay:0.2s}
.bar:nth-child(4){height:85%;animation-delay:0.3s}
.bar:nth-child(5){height:45%;animation-delay:0.4s}
.bar:nth-child(6){height:90%;animation-delay:0.5s}
.bar:nth-child(7){height:60%;animation-delay:0.6s}
.bar:nth-child(8){height:75%;animation-delay:0.7s}
.bar:nth-child(9){height:50%;animation-delay:0.8s}
.bar:nth-child(10){height:80%;animation-delay:0.9s}
.bar:nth-child(11){height:35%;animation-delay:1.0s}
.bar:nth-child(12){height:65%;animation-delay:1.1s}
@keyframes bounce{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}

.card{
  position:relative;z-index:1;
  text-align:center;padding:60px 48px;
  border:1px solid rgba(209,36,80,0.25);
  max-width:520px;width:90%;
  background:rgba(13,13,13,0.85);
}
.card::before{
  content:'';position:absolute;top:-1px;left:10%;right:10%;height:2px;
  background:linear-gradient(90deg,transparent,#D12450,transparent);
}

.logo{height:52px;margin:0 auto 36px}

.status-dot{
  width:8px;height:8px;border-radius:50%;background:#D12450;
  display:inline-block;margin-right:8px;
  animation:pulse 1.5s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

.status-line{
  font-size:9px;letter-spacing:0.35em;text-transform:uppercase;
  color:rgba(240,237,232,0.4);margin-bottom:32px;
  display:flex;align-items:center;justify-content:center;
}

h1{
  font-family:Georgia,serif;font-size:clamp(2rem,5vw,3rem);
  font-weight:700;line-height:1.05;letter-spacing:-0.02em;
  margin-bottom:16px;
}
h1 em{font-style:italic;color:#D12450}

.subtitle{
  font-size:13px;line-height:1.8;color:rgba(240,237,232,0.5);
  margin-bottom:36px;max-width:38ch;margin-left:auto;margin-right:auto;
}

.divider{
  width:48px;height:1px;background:rgba(209,36,80,0.4);
  margin:0 auto 32px;
}

.socials{display:flex;gap:16px;justify-content:center;margin-bottom:40px}
.soc-link{
  font-size:9px;letter-spacing:0.2em;text-transform:uppercase;
  color:rgba(240,237,232,0.35);text-decoration:none;
  padding:6px 14px;border:1px solid rgba(209,36,80,0.2);
  transition:all 0.2s;
}
.soc-link:hover{color:#D12450;border-color:rgba(209,36,80,0.5)}

.contact{
  font-size:10px;letter-spacing:0.1em;color:rgba(240,237,232,0.2);
  margin-top:8px;
}
.contact a{color:rgba(209,36,80,0.5);text-decoration:none}
.contact a:hover{color:#D12450}

.corner{
  position:absolute;width:12px;height:12px;
  border-color:rgba(209,36,80,0.4);border-style:solid;
}
.corner.tl{top:8px;left:8px;border-width:1px 0 0 1px}
.corner.tr{top:8px;right:8px;border-width:1px 1px 0 0}
.corner.bl{bottom:8px;left:8px;border-width:0 0 1px 1px}
.corner.br{bottom:8px;right:8px;border-width:0 1px 1px 0}
</style>
</head>
